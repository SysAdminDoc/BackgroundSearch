<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="icons/32.png">
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crust: #11111b;
    --mantle: #181825;
    --base: #1e1e2e;
    --surface0: #313244;
    --surface1: #45475a;
    --surface2: #585b70;
    --overlay0: #6c7086;
    --text: #cdd6f4;
    --subtext0: #a6adc8;
    --subtext1: #bac2de;
    --blue: #89b4fa;
    --green: #a6e3a1;
    --red: #f38ba8;
    --mauve: #cba6f7;
    --peach: #fab387;
    --yellow: #f9e2af;
    --teal: #94e2d5;
    --lavender: #b4befe;
  }

  body {
    width: 360px;
    max-height: 520px;
    overflow-y: auto;
    background: var(--base);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
  }

  body::-webkit-scrollbar { width: 6px; }
  body::-webkit-scrollbar-track { background: var(--mantle); }
  body::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }
  body::-webkit-scrollbar-thumb:hover { background: var(--surface2); }

  .header {
    background: linear-gradient(135deg, var(--mantle), var(--crust));
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--surface0);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--blue), var(--mauve));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg { width: 16px; height: 16px; }

  .header-text h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .header-text span {
    font-size: 10px;
    color: var(--overlay0);
    font-weight: 400;
  }

  .section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--surface0);
  }

  .section:last-child { border-bottom: none; }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--overlay0);
    margin-bottom: 10px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--mantle);
    margin-bottom: 6px;
    transition: background 0.15s;
  }

  .toggle-row:hover { background: var(--surface0); }
  .toggle-row:last-child { margin-bottom: 0; }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .toggle-label .icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--crust);
  }

  .toggle-label span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .toggle-switch input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--surface1);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .toggle-switch input:checked + .toggle-track { background: var(--blue); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); }

  .feature-toggle .toggle-row {
    background: linear-gradient(135deg, var(--mantle), var(--surface0));
    border: 1px solid var(--surface0);
  }

  .feature-toggle .toggle-row:hover {
    border-color: var(--surface1);
  }

  .search-filter {
    margin-bottom: 8px;
  }

  .search-filter input {
    width: 100%;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--surface0);
    background: var(--mantle);
    color: var(--text);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-filter input::placeholder { color: var(--surface2); }
  .search-filter input:focus { border-color: var(--blue); }

  .engine-list {
    max-height: 280px;
    overflow-y: auto;
  }

  .engine-list::-webkit-scrollbar { width: 4px; }
  .engine-list::-webkit-scrollbar-track { background: transparent; }
  .engine-list::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 2px; }

  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .btn-sm {
    flex: 1;
    padding: 5px 0;
    border: 1px solid var(--surface1);
    border-radius: 6px;
    background: var(--mantle);
    color: var(--subtext0);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .option-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--mantle);
    margin-bottom: 6px;
    border: 1px solid var(--surface0);
  }

  .option-row:last-child { margin-bottom: 0; }

  .option-label {
    font-size: 12px;
    color: var(--subtext1);
  }

  .seg-control {
    display: flex;
    gap: 2px;
    background: var(--surface0);
    border-radius: 6px;
    padding: 2px;
  }

  .seg-btn {
    padding: 3px 9px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--subtext0);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .seg-btn.active {
    background: var(--surface1);
    color: var(--text);
  }

  .delete-btn {
    width: 20px;
    height: 20px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--red);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.5;
    transition: opacity 0.15s;
    margin-right: 4px;
  }

  .delete-btn:hover { opacity: 1; }

  .add-engine-btn {
    width: 100%;
    margin-top: 6px;
    padding: 7px;
    border: 1px dashed var(--surface1);
    border-radius: 6px;
    background: transparent;
    color: var(--overlay0);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .add-engine-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: rgba(137, 180, 250, 0.05);
  }

  .add-engine-form {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
    padding: 10px;
    background: var(--mantle);
    border-radius: 8px;
    border: 1px solid var(--surface0);
  }

  .add-engine-form.open { display: flex; }

  .add-engine-form input {
    width: 100%;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--surface0);
    background: var(--crust);
    color: var(--text);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-engine-form input::placeholder { color: var(--surface2); }
  .add-engine-form input:focus { border-color: var(--blue); }

  .btn-primary {
    padding: 7px;
    border: none;
    border-radius: 6px;
    background: var(--blue);
    color: var(--crust);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .section-title-row .section-title { margin-bottom: 0; }

  .reset-btn {
    font-size: 9px;
    color: var(--overlay0);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
  }

  .reset-btn:hover { color: var(--subtext0); background: var(--surface0); }

  .bg-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 2px 5px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-right: 4px;
    background: var(--surface0);
    color: var(--surface2);
    transition: all 0.15s;
  }

  .bg-badge.fg {
    background: rgba(250, 179, 135, 0.15);
    color: var(--peach);
  }

  .bg-badge:hover { opacity: 0.75; }

  .option-hint {
    font-size: 10px;
    color: var(--overlay0);
    font-family: monospace;
  }

  .option-hint strong {
    color: var(--blue);
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>BackgroundSearch</h1>
      <span>v2.3.0</span>
    </div>
  </div>

  <div class="section feature-toggle">
    <div class="section-title-row">
      <span class="section-title">Features</span>
      <button class="reset-btn" id="resetFeatures">&#8635; Reset</button>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <span>Force Background Tabs</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="bgTabsEnabled">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <span>Context Menu Search</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="searchEnabled">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <span>Search All Engines</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="searchAll">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="option-row">
      <span class="option-hint">Type <strong>bs</strong>&nbsp;<strong>query</strong> in address bar</span>
    </div>
    <div class="option-row">
      <span class="option-label">Result tab placement</span>
      <div class="seg-control" id="tabPlacementCtrl">
        <button class="seg-btn active" data-val="next">Next to current</button>
        <button class="seg-btn" data-val="end">End of bar</button>
      </div>
    </div>
  </div>

  <div class="section" id="enginesSection">
    <div class="section-title-row">
      <span class="section-title">Search Engines</span>
      <button class="reset-btn" id="resetEngines">&#8635; Reset</button>
    </div>
    <div class="btn-row">
      <button class="btn-sm" id="enableAll">Enable All</button>
      <button class="btn-sm" id="disableAll">Disable All</button>
      <button class="btn-sm" id="exportConfig">↑ Export</button>
      <button class="btn-sm" id="importConfig">↓ Import</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <div class="search-filter">
      <input type="text" id="filterInput" placeholder="Filter engines...">
    </div>
    <div class="engine-list" id="engineList"></div>
    <button class="add-engine-btn" id="toggleAddEngine">+ Add custom engine</button>
    <div class="add-engine-form" id="addEngineForm">
      <input type="text" id="newEngineName" placeholder="Engine name (e.g. Kagi)">
      <input type="text" id="newEngineUrl" placeholder="https://example.com/search?q=%s">
      <button class="btn-primary" id="addEngineBtn">Add Engine</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
